# ========================
# 生产环境配置
# ========================

server:
  # 后端服务端口（Docker 容器内部端口，一般不需要修改）
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    # ========================
    # 数据库连接配置
    # ========================
    # DB_HOST: 数据库主机地址（Docker Compose 中的服务名，默认 mysql）
    # DB_PORT: 数据库端口（默认 3306）
    # DB_NAME: 数据库名称（默认 lucky）
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:lucky}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    # DB_USERNAME: 数据库用户名（默认 root）
    username: ${DB_USERNAME:root}
    # DB_PASSWORD: 数据库密码（必须设置）
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  # RabbitMQ配置
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
  # Sentinel配置
  cloud:
    sentinel:
      enabled: true
      eager: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD:}
        port: 8719

# Redisson配置
redisson:
  single-server-config:
    address: redis://${REDIS_HOST:redis}:${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境关闭 SQL 日志输出
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# ========================
# 活动配置
# ========================
# BASE_URL: 前端访问地址（用于生成二维码等）
# 修改为你的服务器 IP 或域名，例如: http://101.201.233.194 或 https://lucky.example.com
lucky:
  base-url: ${BASE_URL:http://localhost}

# ========================
# 阿里云 OSS 配置（可选）
# ========================
# OSS_ACCESS_KEY_ID: 阿里云 AccessKey ID
# OSS_ACCESS_KEY_SECRET: 阿里云 AccessKey Secret
alibaba:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    bucket-name: ttbyx
    access-key-id: ${OSS_ACCESS_KEY_ID:}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
