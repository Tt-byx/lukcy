version: '3.8'

services:
  mysql:
    build:
      context: .
      dockerfile: docker/Dockerfile.mysql
    container_name: lucky-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: lucky
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: lucky-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: lucky-backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: lucky
      DB_USERNAME: root
      DB_PASSWORD: 123456
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BASE_URL: http://101.201.233.194
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: lucky-frontend
    ports:
      - "5173:5173"
      - "5174:5174"
      - "5175:5175"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis-data:
